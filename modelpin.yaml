# Modelpin's own dogfood config — Modelpin checking itself in CI (see .github/workflows/modelpin.yml).
# This is a self-consistency smoke: baseline gpt-4o-mini, then re-check gpt-4o-mini against that
# committed baseline. A green check proves the engine isn't crying wolf on normal model
# nondeterminism (the false-positive north-star) AND that the GitHub Action works end-to-end.
# To turn it into a real migration check, point `to:` at a new model id in the workflow.
models:
  - gpt-4o-mini            # the committed baseline lives in .modelpin/baseline-gpt-4o-mini.json
scenarios_dir: examples/suite
providers:
  - openai                 # uses OPENAI_API_KEY (a repo secret in CI)
runs: 5
judge_model: gpt-4o-mini   # semantic judge (same key); checks meaning-equivalence, not just text
